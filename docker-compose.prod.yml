services:

  # ── FastAPI backend (4 gunicorn workers) ──────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    environment:
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_KEY: ${SUPABASE_KEY}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      JWT_SECRET: ${JWT_SECRET}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      TRACCAR_WEBHOOK_SECRET: ${TRACCAR_WEBHOOK_SECRET:-}
      # Redis caching (optional) — leave blank to run without cache (graceful degradation).
      # Sign up for a free Upstash Redis account at upstash.com to enable caching.
      UPSTASH_REDIS_REST_URL: ${UPSTASH_REDIS_REST_URL:-}
      UPSTASH_REDIS_REST_TOKEN: ${UPSTASH_REDIS_REST_TOKEN:-}
    networks:
      - internal
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Nginx reverse proxy + static file server ──────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./public:/usr/share/nginx/html:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      # Optional: Let's Encrypt certificate renewal via certbot
      - certbot-webroot:/var/www/certbot:ro
    depends_on:
      api:
        condition: service_healthy
    networks:
      - internal
      - external
    deploy:
      resources:
        limits:
          memory: 64M

volumes:
  certbot-webroot:

networks:
  # internal network: api cannot be reached from outside; only nginx can talk to it
  internal:
    driver: bridge
    internal: true
  # external network: nginx binds public ports on this network
  external:
    driver: bridge
