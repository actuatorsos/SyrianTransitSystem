<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Damascus Transit | Track Buses — تتبع الحافلات</title>
<meta name="description" content="تتبع حافلات نقل دمشق في الوقت الفعلي — اعرف موعد وصول حافلتك | Track Damascus buses in real-time and get live arrival estimates.">
<meta name="apple-mobile-web-app-capable" content="yes">

<meta name="theme-color" content="#428177">

<link rel="manifest" href="manifest.json">

<style>
:root {
  --green-dark: #002623;
  --green-mid: #054239;
  --green-light: #428177;
  --gold: #b9a779;
  --gold-light: #edebe0;
  --umber: #6b1f2a;
  --charcoal: #3d3a3b;
  --white: #ffffff;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { font-family:'IBM Plex Sans Arabic',system-ui,sans-serif; background:var(--green-dark); overflow:hidden; height:100vh; height:100dvh; }

/* ─── Map ─── */
#map { position:absolute; top:0; left:0; right:0; bottom:0; z-index:1; }

/* ─── Top Bar ─── */
.top-bar {
  position:absolute; top:0; left:0; right:0; z-index:100;
  padding:calc(var(--safe-top) + 12px) 16px 12px;
  background:linear-gradient(180deg, rgba(0,38,35,0.95) 0%, rgba(0,38,35,0.7) 70%, transparent 100%);
}
.top-bar .logo-row { display:flex; align-items:center; gap:10px; }
.top-bar h1 { color:var(--white); font-size:20px; font-weight:700; }
.top-bar .badge { background:var(--gold); color:var(--green-dark); padding:3px 10px; border-radius:12px; font-size:11px; font-weight:600; }
.top-bar .live-dot { width:8px; height:8px; background:#10B981; border-radius:50%; margin-right:auto; animation:pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* ─── Search Bar ─── */
.search-bar {
  margin-top:12px; background:var(--white); border-radius:14px; padding:12px 16px;
  display:flex; align-items:center; gap:10px; box-shadow:0 4px 20px rgba(0,0,0,0.15);
}
.search-bar input {
  flex:1; border:none; outline:none; font-size:15px; font-family:inherit;
  background:transparent; color:var(--charcoal);
}
.search-bar input::placeholder { color:#aaa; }
.search-icon { font-size:18px; opacity:0.4; }

/* ─── Bottom Sheet ─── */
.bottom-sheet {
  position:absolute; bottom:0; left:0; right:0; z-index:200;
  background:var(--white); border-radius:20px 20px 0 0;
  box-shadow:0 -4px 30px rgba(0,0,0,0.15);
  transition:transform 0.35s cubic-bezier(0.4,0,0.2,1);
  max-height:70vh; overflow:hidden;
  padding-bottom:var(--safe-bottom);
}
.bottom-sheet.collapsed { transform:translateY(calc(100% - 180px - var(--safe-bottom))); }
.bottom-sheet.expanded { transform:translateY(0); }

.sheet-handle {
  width:36px; height:4px; background:#ddd; border-radius:2px;
  margin:10px auto; cursor:grab;
}

.sheet-header {
  padding:4px 20px 16px; display:flex; align-items:center; justify-content:space-between;
}
.sheet-header h2 { font-size:18px; font-weight:700; color:var(--green-dark); }
.sheet-header .count { font-size:13px; color:var(--green-light); font-weight:600; }

/* ─── Route Cards ─── */
.routes-scroll { overflow-y:auto; max-height:calc(70vh - 100px); padding:0 16px 20px; }

.route-card {
  background:var(--gold-light); border-radius:14px; padding:16px;
  margin-bottom:12px; position:relative; overflow:hidden;
  transition:transform 0.15s, box-shadow 0.15s;
  cursor:pointer;
}
.route-card:active { transform:scale(0.98); }
.route-card::before {
  content:''; position:absolute; right:0; top:0; bottom:0; width:4px;
  background:var(--green-mid);
}

.route-card .route-name { font-size:16px; font-weight:700; color:var(--green-dark); margin-bottom:4px; }
.route-card .route-meta { display:flex; gap:12px; font-size:12px; color:var(--charcoal); opacity:0.7; }

.route-card .eta-row {
  display:flex; align-items:center; gap:8px; margin-top:10px;
  background:var(--white); border-radius:10px; padding:10px 12px;
}
.eta-badge {
  background:var(--green-mid); color:var(--white); padding:4px 10px;
  border-radius:8px; font-size:14px; font-weight:700; min-width:44px; text-align:center;
}
.eta-badge.arriving { background:var(--umber); animation:urgentPulse 1s infinite; }
@keyframes urgentPulse { 0%,100%{opacity:1} 50%{opacity:0.7} }

.eta-info { flex:1; }
.eta-info .vehicle-name { font-size:13px; font-weight:600; color:var(--charcoal); }
.eta-info .vehicle-detail { font-size:11px; color:#888; }

.eta-source { font-size:9px; padding:2px 6px; border-radius:6px; font-weight:600; }
.eta-source.real { background:#EDE9FE; color:#7C3AED; }
.eta-source.sim { background:#F3F4F6; color:#6B7280; }

/* ─── Stop Detail View ─── */
.stop-detail { display:none; }
.stop-detail.active { display:block; }
.stop-detail .back-btn {
  display:flex; align-items:center; gap:6px; font-size:14px; color:var(--green-mid);
  font-weight:600; cursor:pointer; padding:0 20px 12px; border:none; background:none;
}
.stop-detail .stop-name { font-size:20px; font-weight:700; color:var(--green-dark); padding:0 20px 4px; }
.stop-detail .stop-address { font-size:13px; color:#888; padding:0 20px 16px; }
.arrival-list { padding:0 16px 20px; }
.arrival-item {
  display:flex; align-items:center; gap:12px; padding:14px;
  background:var(--gold-light); border-radius:12px; margin-bottom:8px;
}
.arrival-eta { font-size:22px; font-weight:700; color:var(--green-mid); min-width:50px; text-align:center; }
.arrival-eta small { font-size:11px; font-weight:400; display:block; }
.arrival-info { flex:1; }
.arrival-info .name { font-size:14px; font-weight:600; color:var(--charcoal); }
.arrival-info .detail { font-size:12px; color:#888; }

/* ─── Nav Bar ─── */
.nav-bar {
  position:absolute; bottom:0; left:0; right:0; z-index:300;
  background:var(--white); border-top:1px solid #eee;
  display:flex; padding:8px 0 calc(var(--safe-bottom) + 4px);
}
.nav-item {
  flex:1; display:flex; flex-direction:column; align-items:center; gap:2px;
  font-size:10px; color:#999; cursor:pointer; border:none; background:none; padding:8px 4px;
  min-height:44px;
}
.nav-item.active { color:var(--green-mid); }
.nav-item .nav-icon { font-size:22px; }

/* ─── Status Bar (connection) ─── */
.connection-bar {
  position:absolute; top:calc(var(--safe-top) + 82px); left:16px; right:16px; z-index:100;
  background:var(--umber); color:var(--white); text-align:center;
  padding:6px; border-radius:8px; font-size:12px; font-weight:600;
  display:none;
}
.connection-bar.disconnected { display:block; }

/* ─── Loading ─── */
.loading-overlay {
  position:absolute; top:0; left:0; right:0; bottom:0; z-index:500;
  background:var(--green-dark); display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:16px;
  transition:opacity 0.5s;
}
.loading-overlay.hidden { opacity:0; pointer-events:none; display:none !important; }
.loading-overlay h2 { color:var(--white); font-size:24px; }
.loading-overlay p { color:var(--gold); font-size:14px; }
.spinner { width:40px; height:40px; border:3px solid rgba(255,255,255,0.2); border-top-color:var(--gold); border-radius:50%; animation:spin 0.8s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }
</style>
</head>
<body>

<!-- Loading -->
<div class="loading-overlay" id="loading">
  <h2>DamascusTransit</h2>
  <div class="spinner"></div>
  <p>جاري تحميل بيانات الأسطول...</p>
</div>

<!-- Connection status -->
<div class="connection-bar" id="connectionBar">🔄 انقطع الاتصال — جارٍ إعادة الاتصال بالبيانات المباشرة... | Connection lost, retrying...</div>

<!-- Top Bar -->
<div class="top-bar">
  <div class="logo-row">
    <h1>DamascusTransit</h1>
    <div class="badge">مباشر</div>
    <div class="live-dot"></div>
  </div>
  <div class="search-bar" onclick="focusSearch()">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Search routes… ابحث عن خطوط" oninput="filterRoutes(this.value)" dir="auto">
  </div>
</div>

<!-- Map -->
<div id="map"></div>

<!-- Bottom Sheet -->
<div class="bottom-sheet collapsed" id="bottomSheet">
  <div class="sheet-handle" id="sheetHandle"></div>

  <!-- Routes list view -->
  <div id="routesView">
    <div class="sheet-header">
      <h2>الخطوط القريبة</h2>
      <span class="count" id="routeCount">8 خطوط</span>
    </div>
    <div class="routes-scroll" id="routesList">
      <!-- Skeleton placeholder shown until routes render -->
      <div class="route-card" style="opacity:.4;pointer-events:none;margin-bottom:8px;"><div class="dt-skel" style="width:55%;height:1.2em;display:block;margin-bottom:8px;"></div><div class="dt-skel" style="width:80%;height:0.85em;display:block;"></div></div>
      <div class="route-card" style="opacity:.4;pointer-events:none;margin-bottom:8px;"><div class="dt-skel" style="width:65%;height:1.2em;display:block;margin-bottom:8px;"></div><div class="dt-skel" style="width:75%;height:0.85em;display:block;"></div></div>
      <div class="route-card" style="opacity:.4;pointer-events:none;margin-bottom:8px;"><div class="dt-skel" style="width:50%;height:1.2em;display:block;margin-bottom:8px;"></div><div class="dt-skel" style="width:85%;height:0.85em;display:block;"></div></div>
    </div>
  </div>

  <!-- Stop detail view -->
  <div class="stop-detail" id="stopDetail">
    <button class="back-btn" onclick="showRoutes()">→ العودة إلى الخطوط</button>
    <div class="stop-name" id="stopName"></div>
    <div class="stop-address" id="stopAddress"></div>
    <div class="arrival-list" id="arrivalList"></div>
  </div>
</div>

<!-- Nav Bar -->
<div class="nav-bar">
  <button class="nav-item active" onclick="switchTab('map')"><span class="nav-icon">🗺️</span>الخريطة</button>
  <button class="nav-item" onclick="switchTab('routes')"><span class="nav-icon">🚌</span>الخطوط</button>
  <button class="nav-item" onclick="switchTab('stops')"><span class="nav-icon">📍</span>المحطات</button>
  <button id="pushToggleBtn" class="nav-item" onclick="switchTab('alerts'); togglePushNotifications()" title="تفعيل الإشعارات — Enable notifications"><span class="nav-icon">🔔</span>التنبيهات</button>
</div>

<script>
// ─── CONFIG ───
const API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
  ? `http://${window.location.hostname}:8080`
  : window.location.origin;
const DAMASCUS_CENTER = [36.2913, 33.5138];

// ─── Damascus Routes Data ───
const ROUTES = [
  { id: "marjeh_western", name: "Marjeh → Western Station", nameAr: "المرجة → المحطة الغربية", stops: 8, distance: "6.2 km", busCount: 0, color: "#3B82F6" },
  { id: "mezzeh_autostrade", name: "Mezzeh Autostrade", nameAr: "أوتوستراد المزة", stops: 6, distance: "8.5 km", busCount: 0, color: "#10B981" },
  { id: "harasta", name: "Harasta → Damascus", nameAr: "حرستا → دمشق", stops: 5, distance: "7.8 km", busCount: 0, color: "#F59E0B" },
  { id: "douma", name: "Douma → Damascus", nameAr: "دوما → دمشق", stops: 6, distance: "12.3 km", busCount: 0, color: "#EF4444" },
  { id: "jaramana", name: "Jaramana → Center", nameAr: "جرمانا → المركز", stops: 4, distance: "5.1 km", busCount: 0, color: "#8B5CF6" },
  { id: "qudsaya", name: "Qudsaya → Damascus", nameAr: "قدسيا → دمشق", stops: 5, distance: "9.7 km", busCount: 0, color: "#EC4899" },
  { id: "airport", name: "Airport Road", nameAr: "طريق المطار", stops: 3, distance: "22.0 km", busCount: 0, color: "#06B6D4" },
  { id: "barzeh", name: "Barzeh → Center", nameAr: "برزة → المركز", stops: 4, distance: "5.8 km", busCount: 0, color: "#F97316" },
];

// Damascus bus stops with coordinates
const STOPS = [
  { name: "Al-Marjeh Square", nameAr: "ساحة المرجة", lat: 33.5117, lon: 36.2963, routes: ["marjeh_western","mezzeh_autostrade"] },
  { name: "Hijaz Station", nameAr: "محطة الحجاز", lat: 33.5133, lon: 36.2936, routes: ["marjeh_western"] },
  { name: "Umayyad Square", nameAr: "ساحة الأمويين", lat: 33.5142, lon: 36.2765, routes: ["mezzeh_autostrade","airport"] },
  { name: "Western Station", nameAr: "المحطة الغربية", lat: 33.5098, lon: 36.2587, routes: ["marjeh_western"] },
  { name: "Mezzeh 86", nameAr: "مزة 86", lat: 33.5067, lon: 36.2461, routes: ["mezzeh_autostrade"] },
  { name: "Harasta Roundabout", nameAr: "دوار حرستا", lat: 33.5573, lon: 36.3637, routes: ["harasta"] },
  { name: "Douma Main", nameAr: "دوما الرئيسي", lat: 33.5728, lon: 36.4012, routes: ["douma"] },
  { name: "Jaramana Square", nameAr: "ساحة جرمانا", lat: 33.4894, lon: 36.3365, routes: ["jaramana"] },
  { name: "Qudsaya Center", nameAr: "وسط قدسيا", lat: 33.5399, lon: 36.1957, routes: ["qudsaya"] },
  { name: "Airport Terminal", nameAr: "مبنى المطار", lat: 33.4114, lon: 36.5144, routes: ["airport"] },
  { name: "Barzeh Roundabout", nameAr: "دوار برزة", lat: 33.5470, lon: 36.3130, routes: ["barzeh"] },
  { name: "Baramkeh", nameAr: "البرامكة", lat: 33.5096, lon: 36.2913, routes: ["marjeh_western","jaramana","barzeh"] },
  { name: "Muhajreen", nameAr: "المهاجرين", lat: 33.5233, lon: 36.2835, routes: ["qudsaya"] },
  { name: "Abbasiyeen Square", nameAr: "ساحة العباسيين", lat: 33.5263, lon: 36.3152, routes: ["harasta","douma","barzeh"] },
];

// ─── State ───
let vehicles = {};
let markers = {};
let stopMarkers = [];
let map;
let sheetExpanded = false;
let pollInterval = null;

// ─── Arabic search normalization ───
// Strips diacritics (tashkeel) and normalizes alef/hamza/teh-marbuta variants
// so searching "مرجه" matches "مرجة", "اوتوستراد" matches "أوتوستراد", etc.
function normalizeArabic(text) {
  return text
    // Remove tashkeel (harakat, shadda, etc.)
    .replace(/[\u0610-\u061A\u064B-\u065F\u0670]/g, '')
    // Normalize alef forms (أ إ آ ٱ) → ا
    .replace(/[\u0622\u0623\u0625\u0671]/g, '\u0627')
    // Normalize teh marbuta (ة) → ه
    .replace(/\u0629/g, '\u0647')
    // Normalize alef maqsura (ى) → ي
    .replace(/\u0649/g, '\u064A')
    .toLowerCase()
    .trim();
}

function matchesSearch(route, query) {
  if (!query) return true;
  const q = normalizeArabic(query);
  return (
    normalizeArabic(route.name).includes(q) ||
    normalizeArabic(route.nameAr).includes(q)
  );
}

// ─── Haversine distance (km) between two lat/lon points ───
function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat / 2) ** 2 +
            Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
            Math.sin(dLon / 2) ** 2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

// ─── ETA calculation based on vehicle speed and distance to stop ───
// Returns minutes. Falls back to a city-average estimate when speed is unavailable.
function calcETA(vehicle, stopLat, stopLon) {
  const distKm = haversine(vehicle.latitude, vehicle.longitude, stopLat, stopLon);
  const speedKmh = vehicle.speed_kmh && vehicle.speed_kmh > 3 ? vehicle.speed_kmh : 25; // 25 km/h city average
  const rawMin = (distKm / speedKmh) * 60;
  return Math.max(1, Math.round(rawMin));
}

// ─── Map Init ───
function initMap() {
  map = new maplibregl.Map({
    container: 'map',
    style: 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
    center: DAMASCUS_CENTER,
    zoom: 12,
    attributionControl: false,
  });

  map.addControl(new maplibregl.NavigationControl(), 'top-left');

  map.addControl(new maplibregl.GeolocateControl({
    positionOptions: { enableHighAccuracy: true },
    trackUserLocation: true,
    showUserHeading: true,
  }), 'top-left');

  // Add stop markers
  STOPS.forEach(stop => {
    const el = document.createElement('div');
    el.style.cssText = `width:14px;height:14px;background:var(--gold);border:2px solid var(--white);border-radius:50%;box-shadow:0 2px 6px rgba(0,0,0,0.3);cursor:pointer;`;
    const marker = new maplibregl.Marker({ element: el })
      .setLngLat([stop.lon, stop.lat])
      .setPopup(new maplibregl.Popup({ offset: 15, className: 'stop-popup' })
        .setHTML(`<div style="font-family:'IBM Plex Sans Arabic';padding:4px;direction:rtl;">
          <strong>${stop.nameAr}</strong><br>
          <span style="color:#888;font-size:12px;">${stop.name}</span><br>
          <span style="font-size:12px;color:var(--green-mid);">اضغط لعرض المواعيد ←</span>
        </div>`))
      .addTo(map);

    el.addEventListener('click', () => setTimeout(() => showStopDetail(stop), 200));
    stopMarkers.push(marker);
  });

  // Start data loading immediately — don't wait for map tiles
  updateRouteCards();
  fetchVehicles();
  pollInterval = setInterval(fetchVehicles, 5000);

  let mapLoaded = false;
  map.on('load', () => {
    mapLoaded = true;
    document.getElementById('loading').classList.add('hidden');
  });

  // Fallback: dismiss spinner after 5s even if map tiles never fire 'load'
  setTimeout(() => {
    if (!mapLoaded) {
      document.getElementById('loading').classList.add('hidden');
    }
  }, 5000);
}

// ─── Fetch all vehicles ───
async function fetchVehicles() {
  try {
    const fetchFn = window.DT ? DT.fetchWithTimeout : fetch;
    const res = await fetchFn(`${API_BASE}/api/vehicles`, {}, 5000);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    // Hide connection error if it was shown
    document.getElementById('connectionBar').classList.remove('disconnected');
    data.forEach(v => {
      vehicles[v.vehicle_id] = v;
      updateMarker(v);
    });
    updateRouteCards();
  } catch(e) {
    console.log('Fetch error:', e);
    const isTimeout = e.isTimeout || e.name === 'AbortError';
    document.getElementById('connectionBar').classList.add('disconnected');
    updateRouteCards();
    if (window.DT) {
      DT.toast(
        isTimeout ? 'انتهت مهلة التحميل — جارٍ إعادة المحاولة' : 'انقطع الاتصال — جارٍ إعادة المحاولة...',
        isTimeout ? 'Load timed out, retrying in 10s...' : 'Connection lost, retrying...',
        'warn',
        8000
      );
    }
  }
}

// ─── Marker Management ───
const typeColors = { bus:'#3B82F6', microbus:'#10B981', taxi:'#F59E0B' };

function updateMarker(v) {
  if (!map) return;
  const isReal = v.source === 'traccar';

  if (markers[v.vehicle_id]) {
    markers[v.vehicle_id].setLngLat([v.longitude, v.latitude]);
    // Refresh popup with latest speed/status
    markers[v.vehicle_id].getPopup().setHTML(markerPopupHTML(v, isReal));
    return;
  }

  const el = document.createElement('div');
  const color = isReal ? '#8B5CF6' : (v.status === 'stopped' ? '#EF4444' : (typeColors[v.vehicle_type] || '#6B7280'));
  const size = isReal ? 28 : 20;
  el.style.cssText = `width:${size}px;height:${size}px;border-radius:50%;background:${color};border:2px solid ${isReal?'#DDD6FE':'#fff'};box-shadow:${isReal?'0 0 10px rgba(139,92,246,0.5),':''}0 2px 6px rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center;font-size:${isReal?14:11}px;cursor:pointer;`;
  el.textContent = isReal ? '📍' : (v.vehicle_type === 'bus' ? '🚌' : v.vehicle_type === 'microbus' ? '🚐' : '🚕');

  const popup = new maplibregl.Popup({ offset: 15 }).setHTML(markerPopupHTML(v, isReal));

  markers[v.vehicle_id] = new maplibregl.Marker({ element: el })
    .setLngLat([v.longitude, v.latitude])
    .setPopup(popup)
    .addTo(map);
}

function markerPopupHTML(v, isReal) {
  return `
    <div style="font-family:'IBM Plex Sans Arabic';padding:4px;">
      <strong>${v.vehicle_id}</strong>
      ${isReal ? '<span style="background:#8B5CF6;color:#fff;padding:1px 6px;border-radius:8px;font-size:9px;margin-right:4px;">GPS حقيقي</span>' : ''}
      <br><span style="color:#888;font-size:12px;">${v.route_name || v.assigned_route_id || 'خط غير معروف'}</span>
      <br><span style="font-size:12px;">${v.speed_kmh || 0} km/h · ${v.status || ''}</span>
    </div>
  `;
}

// ─── Route Cards ───
// ETA computed from real vehicle position + speed via Haversine.
function getRouteRepresentativeStop(routeId) {
  return STOPS.find(s => s.routes.includes(routeId));
}

function updateRouteCards() {
  const routeCounts = {};
  const routeETAs = {};

  Object.values(vehicles).forEach(v => {
    const rname = v.route_name || v.assigned_route_id || '';
    ROUTES.forEach(r => {
      const matched = rname.toLowerCase().includes(r.id.replace(/_/g,' ')) ||
                      rname.includes(r.name.split('→')[0].trim()) ||
                      rname.includes(r.nameAr);
      if (matched) {
        routeCounts[r.id] = (routeCounts[r.id] || 0) + 1;
        const stop = getRouteRepresentativeStop(r.id);
        if (stop) {
          const eta = calcETA(v, stop.lat, stop.lon);
          if (!routeETAs[r.id] || eta < routeETAs[r.id].eta) {
            routeETAs[r.id] = { eta, vehicle: v };
          }
        }
      }
    });
  });

  // Assign unmatched vehicles round-robin with real ETA
  const unmatched = Object.values(vehicles).filter(v => {
    const rname = v.route_name || v.assigned_route_id || '';
    return !ROUTES.some(r => rname.toLowerCase().includes(r.id.replace(/_/g,' ')));
  });
  unmatched.forEach((v, i) => {
    const r = ROUTES[i % ROUTES.length];
    routeCounts[r.id] = (routeCounts[r.id] || 0) + 1;
    if (!routeETAs[r.id]) {
      const stop = getRouteRepresentativeStop(r.id);
      const eta = stop ? calcETA(v, stop.lat, stop.lon) : 10;
      routeETAs[r.id] = { eta, vehicle: v };
    }
  });

  const searchVal = document.getElementById('searchInput').value;
  const filtered = ROUTES.filter(r => matchesSearch(r, searchVal));

  document.getElementById('routeCount').textContent = `${filtered.length} خط`;
  document.getElementById('routesList').innerHTML = filtered.map(r => {
    const count = routeCounts[r.id] || 0;
    const etaInfo = routeETAs[r.id];
    const eta = etaInfo ? etaInfo.eta : '--';
    const isReal = etaInfo && etaInfo.vehicle && etaInfo.vehicle.source === 'traccar';
    const etaClass = typeof eta === 'number' && eta <= 2 ? 'arriving' : '';

    return `
    <div class="route-card" onclick="showRouteOnMap('${r.id}')">
      <div class="route-name">${r.nameAr}</div>
      <div class="route-meta">
        <span>${r.name}</span>
        <span>·</span>
        <span>${r.stops} محطة</span>
        <span>·</span>
        <span>${count} مركبة نشطة</span>
      </div>
      <div class="eta-row">
        <div class="eta-badge ${etaClass}">${eta}<small>د</small></div>
        <div class="eta-info">
          <div class="vehicle-name">أقرب وصول${etaInfo ? ': ' + etaInfo.vehicle.vehicle_id : ''}</div>
          <div class="vehicle-detail">${r.distance} · ${etaInfo && etaInfo.vehicle ? (etaInfo.vehicle.speed_kmh || 0) + ' km/h' : ''}</div>
        </div>
        <span class="eta-source ${isReal ? 'real' : 'sim'}">${isReal ? 'GPS' : 'تقدير'}</span>
      </div>
    </div>`;
  }).join('');
}

// ─── Stop Detail ───
function showStopDetail(stop) {
  document.getElementById('routesView').style.display = 'none';
  document.getElementById('stopDetail').classList.add('active');
  document.getElementById('stopName').textContent = stop.nameAr;
  document.getElementById('stopAddress').textContent = stop.name;

  // Compute arrivals using real ETA from vehicle positions
  const arrivals = stop.routes.map(rid => {
    const route = ROUTES.find(r => r.id === rid);
    if (!route) return null;

    // Find nearest vehicle on this route
    const routeVehicles = Object.values(vehicles).filter(v =>
      (v.route_name || v.assigned_route_id || '').toLowerCase().includes(rid.replace(/_/g,' '))
    );

    let bestVehicle = null;
    let bestEta = Infinity;

    routeVehicles.forEach(v => {
      const eta = calcETA(v, stop.lat, stop.lon);
      if (eta < bestEta) { bestEta = eta; bestVehicle = v; }
    });

    // Fallback: nearest vehicle overall
    if (!bestVehicle) {
      Object.values(vehicles).forEach(v => {
        const eta = calcETA(v, stop.lat, stop.lon);
        if (eta < bestEta) { bestEta = eta; bestVehicle = v; }
      });
    }

    const eta = bestVehicle ? Math.min(bestEta, 60) : '--';
    const isReal = bestVehicle && bestVehicle.source === 'traccar';
    return { route, eta, vehicle: bestVehicle, isReal };
  }).filter(Boolean).sort((a,b) => {
    if (a.eta === '--') return 1;
    if (b.eta === '--') return -1;
    return a.eta - b.eta;
  });

  document.getElementById('arrivalList').innerHTML = arrivals.map(a => `
    <div class="arrival-item">
      <div class="arrival-eta">${a.eta}<small>د</small></div>
      <div class="arrival-info">
        <div class="name">${a.route.nameAr} ${a.isReal ? '<span style="background:#8B5CF6;color:#fff;padding:1px 5px;border-radius:6px;font-size:9px;">GPS</span>' : ''}</div>
        <div class="detail">${a.vehicle ? a.vehicle.vehicle_id + ' · ' + (a.vehicle.speed_kmh || 0) + ' km/h' : 'تقدير'}</div>
      </div>
    </div>
  `).join('');

  expandSheet();
  map.flyTo({ center: [stop.lon, stop.lat], zoom: 15 });
}

function showRoutes() {
  document.getElementById('stopDetail').classList.remove('active');
  document.getElementById('routesView').style.display = 'block';
}

function showRouteOnMap(routeId) {
  const stop = STOPS.find(s => s.routes.includes(routeId));
  if (stop) map.flyTo({ center: [stop.lon, stop.lat], zoom: 14 });
}

// ─── Sheet Gestures ───
function expandSheet() {
  sheetExpanded = true;
  document.getElementById('bottomSheet').classList.remove('collapsed');
  document.getElementById('bottomSheet').classList.add('expanded');
}
function collapseSheet() {
  sheetExpanded = false;
  document.getElementById('bottomSheet').classList.remove('expanded');
  document.getElementById('bottomSheet').classList.add('collapsed');
  showRoutes();
}

document.getElementById('sheetHandle').addEventListener('click', () => {
  sheetExpanded ? collapseSheet() : expandSheet();
});

let touchStartY = 0;
document.getElementById('bottomSheet').addEventListener('touchstart', e => {
  touchStartY = e.touches[0].clientY;
}, { passive: true });
document.getElementById('bottomSheet').addEventListener('touchend', e => {
  const diff = e.changedTouches[0].clientY - touchStartY;
  if (diff > 60) collapseSheet();
  else if (diff < -60) expandSheet();
}, { passive: true });

// ─── Search ───
function filterRoutes(val) { updateRouteCards(); }
function focusSearch() { document.getElementById('searchInput').focus(); }

// ─── Nav Tabs ───
function switchTab(tab) {
  document.querySelectorAll('.nav-item').forEach((el,i) => {
    el.classList.toggle('active', ['map','routes','stops','alerts'][i] === tab);
  });
  if (tab === 'routes' || tab === 'stops') expandSheet();
  else collapseSheet();
}

// ─── Service Worker + Web Push ───
let _swReg = null;

if ('serviceWorker' in navigator) {
  window.addEventListener('load', async () => {
    try {
      _swReg = await navigator.serviceWorker.register('/passenger/service-worker.js');
      console.log('SW registered:', _swReg.scope);

      // Listen for stop-focus messages from push notification clicks
      navigator.serviceWorker.addEventListener('message', event => {
        if (event.data && event.data.type === 'FOCUS_STOP') {
          const stop = STOPS.find(s => s.name === event.data.stopId || s.nameAr === event.data.stopId);
          if (stop && map) map.flyTo({ center: [stop.lon, stop.lat], zoom: 16 });
        }
      });
    } catch (err) {
      console.warn('SW registration failed:', err);
    }
  });
}

function urlBase64ToUint8Array(base64String) {
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
  const raw = atob(base64);
  return Uint8Array.from([...raw].map(c => c.charCodeAt(0)));
}

async function togglePushNotifications() {
  if (!('PushManager' in window) || !_swReg) {
    alert('إشعارات الدفع غير مدعومة في هذا المتصفح — Push notifications not supported in this browser.');
    return;
  }
  const btn = document.getElementById('pushToggleBtn');
  const existing = await _swReg.pushManager.getSubscription();
  if (existing) {
    // Unsubscribe
    await existing.unsubscribe();
    await fetch(`${API_BASE}/api/push/subscribe`, {
      method: 'DELETE',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ endpoint: existing.endpoint }),
    }).catch(() => {});
    if (btn) { btn.textContent = '🔔'; btn.title = 'تفعيل الإشعارات — Enable notifications'; }
    return;
  }
  // Subscribe
  try {
    const keyRes = await fetch(`${API_BASE}/api/push/vapid-public-key`);
    const { publicKey, enabled } = await keyRes.json();
    if (!enabled || !publicKey) { alert('Push notifications are not configured on this server.'); return; }

    const permission = await Notification.requestPermission();
    if (permission !== 'granted') return;

    const sub = await _swReg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: urlBase64ToUint8Array(publicKey),
    });

    await fetch(`${API_BASE}/api/push/subscribe`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ subscription: sub.toJSON(), role: 'passenger' }),
    });

    if (btn) { btn.textContent = '🔕'; btn.title = 'إيقاف الإشعارات — Disable notifications'; }
  } catch (err) {
    console.warn('Push subscribe failed:', err);
    alert('فشل تفعيل الإشعارات — Failed to enable push notifications.');
  }
}

// ─── Init ───
initMap();
</script>
