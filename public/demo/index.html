<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Damascus Transit System - Interactive Demo</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/maplibre-gl@4.0.0/dist/maplibre-gl.js"></script>
<link href="https://cdn.jsdelivr.net/npm/maplibre-gl@4.0.0/dist/maplibre-gl.css" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --green-primary:#428177;--green-dark:#054239;--green-darker:#002623;
  --gold:#b9a779;--gold-light:#edebe0;--gold-dark:#988561;
  --umber:#6b1f2a;--umber-dark:#4a151e;
  --charcoal:#3d3a3b;--bg:#0f1117;
  --text:#e8e8e8;--text-muted:#9ca3af;
  --card-bg:rgba(30,33,42,0.85);--border:rgba(255,255,255,0.08);
}
html,body{width:100%;height:100%;font-family:'IBM Plex Sans Arabic',sans-serif;background:var(--bg);color:var(--text);overflow:hidden}

/* Header */
.header{position:fixed;top:0;left:0;right:0;height:64px;background:rgba(15,17,23,0.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;z-index:1000}
.header-brand{display:flex;align-items:center;gap:12px}
.brand-mark{width:36px;height:36px;background:linear-gradient(135deg,var(--green-primary),var(--green-dark));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;color:white;font-weight:700}
.brand-text{font-size:18px;font-weight:700;color:white;letter-spacing:0.5px}
.brand-badge{background:var(--green-primary);color:white;padding:3px 10px;border-radius:10px;font-size:10px;font-weight:600;letter-spacing:0.5px;text-transform:uppercase}
.header-stats{display:flex;gap:24px;align-items:center}
.h-stat{display:flex;flex-direction:column;align-items:center;gap:1px}
.h-stat-val{font-size:20px;font-weight:700;color:var(--gold)}
.h-stat-lbl{font-size:10px;color:var(--text-muted);letter-spacing:0.5px}
.header-controls{display:flex;align-items:center;gap:12px}
.ctrl-btn{background:var(--card-bg);border:1px solid var(--border);color:var(--text);padding:6px 14px;border-radius:8px;cursor:pointer;font-family:inherit;font-size:12px;font-weight:500;transition:all 0.2s}
.ctrl-btn:hover{border-color:var(--green-primary);color:var(--green-primary)}
.ctrl-btn.active{background:var(--green-primary);border-color:var(--green-primary);color:white}
.live-dot{width:8px;height:8px;background:#10b981;border-radius:50%;animation:pulse 2s infinite;margin-left:6px;display:inline-block}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(16,185,129,0.4)}50%{opacity:0.7;box-shadow:0 0 0 6px rgba(16,185,129,0)}}

/* Map */
#map{position:absolute;top:64px;left:0;right:0;bottom:0;z-index:1}

/* Stats Overlay - Bottom Left */
.stats-overlay{position:fixed;bottom:20px;left:20px;z-index:500;display:flex;flex-direction:column;gap:10px;width:280px}
.stat-card{background:var(--card-bg);backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:14px;transition:transform 0.2s}
.stat-card:hover{transform:translateX(4px)}
.stat-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.stat-icon.vehicles{background:rgba(66,129,119,0.2)}
.stat-icon.routes{background:rgba(185,167,121,0.2)}
.stat-icon.passengers{background:rgba(107,31,42,0.2)}
.stat-icon.ontime{background:rgba(16,185,129,0.2)}
.stat-info{flex:1}
.stat-number{font-size:22px;font-weight:700;color:white;line-height:1}
.stat-name{font-size:11px;color:var(--text-muted);margin-top:2px}

/* Route Legend - Top Right */
.route-legend{position:fixed;top:80px;right:16px;z-index:500;background:var(--card-bg);backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:12px;padding:14px;width:240px;max-height:calc(100vh - 160px);overflow-y:auto}
.legend-title{font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px}
.legend-item{display:flex;align-items:center;gap:10px;padding:6px 0;cursor:pointer;transition:opacity 0.2s}
.legend-item:hover{opacity:0.8}
.legend-color{width:24px;height:4px;border-radius:2px;flex-shrink:0}
.legend-name{font-size:12px;color:var(--text);flex:1}
.legend-type{font-size:10px;padding:2px 6px;border-radius:4px;font-weight:600}
.legend-type.bus{background:rgba(66,129,119,0.2);color:var(--green-primary)}
.legend-type.microbus{background:rgba(185,167,121,0.2);color:var(--gold)}

/* Vehicle Info Panel */
.vehicle-panel{position:fixed;bottom:20px;right:16px;z-index:500;background:var(--card-bg);backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:12px;padding:16px;width:260px;display:none}
.vehicle-panel.visible{display:block;animation:slideIn 0.3s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.vp-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.vp-title{font-size:15px;font-weight:700;color:var(--gold)}
.vp-close{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:18px;padding:2px}
.vp-row{display:flex;justify-content:space-between;padding:5px 0;font-size:12px;border-bottom:1px solid var(--border)}
.vp-row:last-child{border-bottom:none}
.vp-label{color:var(--text-muted)}
.vp-value{color:var(--text);font-weight:500}

/* Speed Control */
.speed-control{position:fixed;top:80px;left:16px;z-index:500;background:var(--card-bg);backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:10px}
.speed-label{font-size:11px;color:var(--text-muted)}
.speed-btns{display:flex;gap:4px}
.speed-btn{background:transparent;border:1px solid var(--border);color:var(--text-muted);padding:4px 10px;border-radius:6px;cursor:pointer;font-size:11px;font-family:inherit;font-weight:600;transition:all 0.2s}
.speed-btn.active{background:var(--green-primary);border-color:var(--green-primary);color:white}
.speed-btn:hover{border-color:var(--green-primary)}

/* Presentation Mode Banner */
.demo-banner{position:fixed;top:64px;left:0;right:0;z-index:900;background:linear-gradient(90deg,var(--green-dark),var(--green-primary),var(--green-dark));padding:6px 0;text-align:center;font-size:12px;color:white;font-weight:500;letter-spacing:0.5px;display:none}
.demo-banner.visible{display:block}

/* MapLibre overrides */
.maplibregl-popup-content{background:var(--card-bg)!important;border:1px solid var(--border)!important;border-radius:10px!important;padding:12px!important;color:var(--text)!important;font-family:'IBM Plex Sans Arabic',sans-serif!important;backdrop-filter:blur(16px)}
.maplibregl-popup-close-button{color:var(--text-muted)!important;font-size:16px!important}
.maplibregl-popup-tip{border-top-color:rgba(30,33,42,0.85)!important}
.maplibregl-ctrl-attrib{font-size:10px!important;background:rgba(15,17,23,0.7)!important;color:var(--text-muted)!important}
.maplibregl-ctrl-attrib a{color:var(--text-muted)!important}

/* Scrollbar */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:3px}

@media(max-width:768px){
  .stats-overlay{bottom:12px;left:12px;width:200px}
  .stat-card{padding:10px 12px}
  .stat-number{font-size:18px}
  .route-legend{display:none}
  .speed-control{top:auto;bottom:12px;left:auto;right:12px}
  .header-stats{display:none}
}
</style>
</head>

<header class="header">

    <button class="ctrl-btn" id="btn-stops" onclick="toggleStops()">Stops</button>

<!-- Map -->
<div id="map"></div>

<!-- Speed Control -->
<div class="speed-control">

    <button class="speed-btn" data-speed="1" onclick="setSpeed(1)">1x</button>

  <div class="stat-card"><div class="stat-icon passengers">&#x1F465;</div><div class="stat-info"><div class="stat-number" id="stat-passengers">12,847</div><div class="stat-name" data-ar="ركاب اليوم" data-en="Passengers Today">Passengers Today</div></div></div>
  <div class="stat-card"><div class="stat-icon ontime">&#x2705;</div><div class="stat-info"><div class="stat-number" id="stat-ontime">94.2%</div><div class="stat-name" data-ar="الالتزام بالمواعيد" data-en="On-Time Performance">On-Time Performance</div></div></div>
</div>

<!-- Route Legend -->
<div class="route-legend" id="route-legend">
  <div class="legend-title" data-ar="خطوط السير" data-en="Routes">Routes</div>
  <div id="legend-items"></div>
</div>

<!-- Vehicle Info Panel -->
<div class="vehicle-panel" id="vehicle-panel">
  <div class="vp-header">
    <span class="vp-title" id="vp-title"></span>
    <button class="vp-close" onclick="closeVehiclePanel()">&times;</button>

        'carto-dark': {
          type: 'raster',
          tiles: ['https://basemaps.cartocdn.com/dark_all/{z}/{x}/{y}@2x.png'],
          tileSize: 256,
          attribution: '&copy; CartoDB &copy; OSM'
        }
      },
      layers: [{id: 'carto-dark', type: 'raster', source: 'carto-dark'}]
    },
    center: [36.295, 33.512],
    zoom: 12.5,
    pitch: 0,
    bearing: 0,
    attributionControl: true,
    dragRotate: false
  });

  map.on('load', () => {
    drawRouteLines();
    drawStopMarkers();
    initVehicles();
    startSimulation();
    buildRouteLegend();
  });

  map.addControl(new maplibregl.NavigationControl({showCompass:false}), 'bottom-right');
}

// ====================================================================
// ROUTE LINES
// ====================================================================
function drawRouteLines() {
  ROUTES.forEach(route => {
    const coords = route.stops.map(sid => {
      const s = STOP_MAP[sid];
      return [s.lon, s.lat];
    });

    const sourceId = `route-${route.id}`;
    const layerId = `route-line-${route.id}`;

    map.addSource(sourceId, {
      type: 'geojson',
      data: {
        type: 'Feature',
        geometry: { type: 'LineString', coordinates: coords }
      }
    });

    // Outer glow
    map.addLayer({
      id: `${layerId}-glow`,
      type: 'line',
      source: sourceId,
      layout: { 'line-join': 'round', 'line-cap': 'round' },
      paint: {
        'line-color': route.color,
        'line-width': 8,
        'line-opacity': 0.15,
        'line-blur': 4
      }
    });

    // Main line
    map.addLayer({
      id: layerId,
      type: 'line',
      source: sourceId,
      layout: { 'line-join': 'round', 'line-cap': 'round' },
      paint: {
        'line-color': route.color,
        'line-width': 3,
        'line-opacity': 0.7,
        'line-dasharray': route.type === 'microbus' ? [4, 3] : [1]
      }
    });

    routeLayers.push(`${layerId}-glow`, layerId);
  });
}

// ====================================================================
// STOP MARKERS
// ====================================================================
function drawStopMarkers() {
  STOPS.forEach(stop => {
    const el = document.createElement('div');
    el.style.cssText = 'width:10px;height:10px;background:rgba(185,167,121,0.7);border:1.5px solid rgba(255,255,255,0.5);border-radius:50%;cursor:pointer;transition:transform 0.2s';
    el.addEventListener('mouseenter', () => el.style.transform = 'scale(1.8)');
    el.addEventListener('mouseleave', () => el.style.transform = 'scale(1)');

    const popup = new maplibregl.Popup({offset: 12, closeButton: false})
      .setHTML(`<div style="font-family:'IBM Plex Sans Arabic',sans-serif;padding:4px"><strong style="color:#b9a779">${stop.name_ar}</strong><br><span style="font-size:11px;color:#9ca3af">${stop.name}</span>${stop.shelter ? '<br><span style="font-size:10px;color:#10b981">&#x1F3D7; Shelter</span>' : ''}</div>`);

    const marker = new maplibregl.Marker({element: el, anchor: 'center'})
      .setLngLat([stop.lon, stop.lat])
      .setPopup(popup)
      .addTo(map);

    stopMarkerEls.set(stop.id, marker);
  });
}

// ====================================================================
// VEHICLE SIMULATION
// ====================================================================
function initVehicles() {
  VEHICLES.forEach((v, idx) => {
    // Stagger phase so vehicles are spread along routes
    v.phase = (idx * 0.13) % 1;
    v.occupancy = 20 + Math.random() * 60;
    v.speed = 0;
    v.heading = 0;
    v.lat = 0;
    v.lon = 0;

    // Taxi: random target point
    if (!v.route) {
      v.taxiTarget = Math.floor(Math.random() * TAXI_ZONES.length);
      v.taxiProgress = Math.random();
      v.taxiFrom = Math.floor(Math.random() * TAXI_ZONES.length);
    }

    createVehicleMarker(v);
  });
}

function createVehicleMarker(v) {
  const el = document.createElement('div');
  const size = v.type === 'bus' ? 32 : v.type === 'microbus' ? 28 : 24;
  el.style.cssText = `width:${size}px;height:${size}px;cursor:pointer;transition:transform 0.1s`;

  const colors = {bus:'#428177',microbus:'#b9a779',taxi:'#d4a84b'};
  const icons = {bus:'\u{1F68C}',microbus:'\u{1F690}',taxi:'\u{1F695}'};
  const color = encodeURIComponent(colors[v.type]);
  const icon = icons[v.type];

  el.style.backgroundImage = `url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="${color}" opacity="0.9"/><text x="50" y="58" font-size="46" text-anchor="middle" dominant-baseline="middle">${icon}</text></svg>')`;
  el.style.backgroundSize = 'contain';

  el.addEventListener('click', () => showVehicleInfo(v));

  const marker = new maplibregl.Marker({element: el, anchor: 'center'})
    .setLngLat([36.295, 33.512])
    .addTo(map);

  vehicleMarkers.set(v.id, {marker, el});
}

function simulateStep(dt) {
  simTime += dt * speedMultiplier;

  VEHICLES.forEach(v => {
    if (v.route) {
      simulateRoutedVehicle(v);
    } else {
      simulateTaxi(v);
    }

    // Update marker position
    const entry = vehicleMarkers.get(v.id);
    if (entry) {
      entry.marker.setLngLat([v.lon, v.lat]);
      entry.el.style.transform = `rotate(${v.heading}deg)`;
    }
  });

  // Update passenger count slowly
  passengerCount += Math.floor(Math.random() * 3 * speedMultiplier);
  if (passengerCount > 99999) passengerCount = 12000 + Math.floor(Math.random() * 5000);
  document.getElementById('stat-passengers').textContent = passengerCount.toLocaleString();
  document.getElementById('hstat-passengers').textContent = passengerCount.toLocaleString();

  // Update on-time (slight fluctuation)
  const ontime = 92 + Math.random() * 5;
  document.getElementById('stat-ontime').textContent = ontime.toFixed(1) + '%';
  document.getElementById('hstat-ontime').textContent = Math.round(ontime) + '%';

  // Update selected vehicle panel
  if (selectedVehicle) updateVehiclePanel(selectedVehicle);
}

function simulateRoutedVehicle(v) {
  const route = ROUTES.find(r => r.id === v.route);
  if (!route) return;

  const stops = route.stops.map(sid => STOP_MAP[sid]);
  const totalSegments = stops.length - 1;
  if (totalSegments < 1) return;

  // Cycle: 30 minutes real-time per round trip, scaled by speedMultiplier
  const cycleDuration = 1800; // seconds for one round trip
  const t = (simTime / cycleDuration + v.phase) % 2; // 0-1 forward, 1-2 reverse
  const progress = t <= 1 ? t : 2 - t;

  // Find which segment we're on
  const segFloat = progress * totalSegments;
  const segIdx = Math.min(Math.floor(segFloat), totalSegments - 1);
  const segProgress = segFloat - segIdx;

  const from = stops[segIdx];
  const to = stops[Math.min(segIdx + 1, stops.length - 1)];

  // Interpolate position
  v.lat = from.lat + (to.lat - from.lat) * segProgress;
  v.lon = from.lon + (to.lon - from.lon) * segProgress;

  // Add slight GPS noise
  v.lat += (Math.random() - 0.5) * 0.0002;
  v.lon += (Math.random() - 0.5) * 0.0002;

  // Calculate heading
  const dlat = to.lat - from.lat;
  const dlon = to.lon - from.lon;
  v.heading = (Math.atan2(dlon, dlat) * 180 / Math.PI + 360) % 360;

  // Speed based on type
  const baseSpeed = v.type === 'bus' ? 30 : 25;
  v.speed = baseSpeed + (Math.random() - 0.5) * 10;

  // Near stops, slow down
  if (segProgress < 0.05 || segProgress > 0.95) {
    v.speed *= 0.3;
  }

  // Occupancy drifts
  v.occupancy += (Math.random() - 0.5) * 2;
  v.occupancy = Math.max(10, Math.min(95, v.occupancy));
}

function simulateTaxi(v) {
  const from = TAXI_ZONES[v.taxiFrom];
  const to = TAXI_ZONES[v.taxiTarget];

  v.taxiProgress += 0.0003 * speedMultiplier;

  if (v.taxiProgress >= 1) {
    v.taxiFrom = v.taxiTarget;
    v.taxiTarget = Math.floor(Math.random() * TAXI_ZONES.length);
    v.taxiProgress = 0;
  }

  const p = v.taxiProgress;
  v.lat = from.lat + (to.lat - from.lat) * p + (Math.random() - 0.5) * 0.0003;
  v.lon = from.lon + (to.lon - from.lon) * p + (Math.random() - 0.5) * 0.0003;

  const dlat = to.lat - from.lat;
  const dlon = to.lon - from.lon;
  v.heading = (Math.atan2(dlon, dlat) * 180 / Math.PI + 360) % 360;
  v.speed = 35 + (Math.random() - 0.5) * 15;
  v.occupancy = Math.floor(Math.random() * 4) + 1;
}

function startSimulation() {
  let lastTime = performance.now();
  function frame(now) {
    const dt = (now - lastTime) / 1000;
    lastTime = now;
    simulateStep(dt);
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}

// ====================================================================
// VEHICLE INFO PANEL
// ====================================================================
function showVehicleInfo(v) {
  selectedVehicle = v;
  const panel = document.getElementById('vehicle-panel');
  panel.classList.add('visible');
  updateVehiclePanel(v);

  // Fly to vehicle
  map.flyTo({center: [v.lon, v.lat], zoom: 14, duration: 800});
}

function updateVehiclePanel(v) {
  const route = ROUTES.find(r => r.id === v.route);
  document.getElementById('vp-title').textContent = v.id + ' - ' + v.name_ar;
  const details = document.getElementById('vp-details');
  details.innerHTML = `
    <div class="vp-row"><span class="vp-label">${lang==='ar'?'النوع':'Type'}</span><span class="vp-value">${v.type}</span></div>
    <div class="vp-row"><span class="vp-label">${lang==='ar'?'الخط':'Route'}</span><span class="vp-value">${route ? route['name' + (lang==='ar'?'_ar':'')] : (lang==='ar'?'حر':'Free-roaming')}</span></div>
    <div class="vp-row"><span class="vp-label">${lang==='ar'?'السرعة':'Speed'}</span><span class="vp-value">${v.speed.toFixed(1)} km/h</span></div>
    <div class="vp-row"><span class="vp-label">${lang==='ar'?'الإشغال':'Occupancy'}</span><span class="vp-value">${Math.round(v.occupancy)}%</span></div>
    <div class="vp-row"><span class="vp-label">${lang==='ar'?'السعة':'Capacity'}</span><span class="vp-value">${v.capacity}</span></div>
    <div class="vp-row"><span class="vp-label">${lang==='ar'?'الموقع':'Position'}</span><span class="vp-value">${v.lat.toFixed(4)}, ${v.lon.toFixed(4)}</span></div>
    <div class="vp-row"><span class="vp-label">${lang==='ar'?'الاتجاه':'Heading'}</span><span class="vp-value">${Math.round(v.heading)}&deg;</span></div>
  `;
}

function closeVehiclePanel() {
  document.getElementById('vehicle-panel').classList.remove('visible');
  selectedVehicle = null;
}

// ====================================================================
// ROUTE LEGEND
// ====================================================================
function buildRouteLegend() {
  const container = document.getElementById('legend-items');
  container.innerHTML = '';
  ROUTES.forEach(route => {
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = `
      <div class="legend-color" style="background:${route.color}"></div>
      <span class="legend-name">${lang === 'ar' ? route.name_ar : route.name}</span>
      <span class="legend-type ${route.type}">${route.type}</span>
    `;
    item.addEventListener('click', () => {
      // Fly to route center
      const stops = route.stops.map(sid => STOP_MAP[sid]);
      const cLat = stops.reduce((s,st) => s+st.lat, 0) / stops.length;
      const cLon = stops.reduce((s,st) => s+st.lon, 0) / stops.length;
      map.flyTo({center: [cLon, cLat], zoom: 13, duration: 800});
    });
    container.appendChild(item);
  });
}

// ====================================================================
// CONTROLS
// ====================================================================
function setSpeed(s) {
  speedMultiplier = s;
  document.querySelectorAll('.speed-btn').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.speed) === s);
  });
}

function toggleLang() {
  lang = lang === 'en' ? 'ar' : 'en';
  document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
  document.documentElement.lang = lang;

  // Update all translatable elements
  document.querySelectorAll('[data-ar]').forEach(el => {
    el.textContent = el.getAttribute(`data-${lang}`);
  });

  buildRouteLegend();
  if (selectedVehicle) updateVehiclePanel(selectedVehicle);
}

function toggleRoutes() {
  showRoutes = !showRoutes;
  routeLayers.forEach(layerId => {
    if (map.getLayer(layerId)) {
      map.setLayoutProperty(layerId, 'visibility', showRoutes ? 'visible' : 'none');
    }
  });
  document.getElementById('btn-routes').classList.toggle('active', showRoutes);
}

function toggleStops() {
  showStopMarkers = !showStopMarkers;
  stopMarkerEls.forEach(marker => {
    marker.getElement().style.display = showStopMarkers ? 'block' : 'none';
  });
  document.getElementById('btn-stops').classList.toggle('active', showStopMarkers);
}

// ====================================================================
// INIT
// ====================================================================
window.addEventListener('load', () => {
  initMap();
  // Set initial button states
  document.getElementById('btn-routes').classList.add('active');
  document.getElementById('btn-stops').classList.add('active');
});
</script>
</body>
