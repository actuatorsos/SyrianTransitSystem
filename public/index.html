<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="DamascusTransit - Real-time vehicle tracking dashboard">
    <title>DamascusTransit - Dashboard</title>

    <!-- Google Fonts: IBM Plex Sans Arabic -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- MapLibre GL JS -->
    <script src="https://cdn.jsdelivr.net/npm/maplibre-gl@4.0.0/dist/maplibre-gl.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/maplibre-gl@4.0.0/dist/maplibre-gl.css" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: 'IBM Plex Sans Arabic', sans-serif;
            background-color: #161616;
            color: #e0e0e0;
            overflow: hidden;
        }

        /* Color Palette */
        :root {
            --forest-green-primary: #428177;
            --forest-green-dark: #054239;
            --forest-green-darker: #002623;
            --golden-wheat-light: #edebe0;
            --golden-wheat-mid: #b9a779;
            --golden-wheat-dark: #988561;
            --deep-umber-light: #6b1f2a;
            --deep-umber-mid: #4a151e;
            --deep-umber-dark: #260f14;
            --charcoal-light: #3d3a3b;
            --charcoal-dark: #161616;
            --gps-purple: #8B5CF6;
            --status-green: #10b981;
            --text-light: #e0e0e0;
            --text-muted: #a0a0a0;
        }

        body {
            display: flex;
            flex-direction: row;
            background-color: var(--charcoal-dark);
        }

        /* Header */
        #header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 70px;
            background-color: var(--charcoal-light);
            border-bottom: 1px solid var(--charcoal-light);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
            flex: 1;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            color: var(--golden-wheat-mid);
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo::before {
            content: '';
            display: inline-block;
            width: 10px;
            height: 10px;
            background-color: var(--forest-green-primary);
            border-radius: 2px;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            background-color: var(--charcoal-dark);
            border-radius: 6px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: var(--status-green);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .status-dot.disconnected {
            background-color: #ef4444;
            animation: none;
        }

        .fleet-stats {
            display: flex;
            gap: 20px;
            font-size: 13px;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .stat-value {
            font-weight: 600;
            color: var(--golden-wheat-mid);
            font-size: 16px;
        }

        .stat-label {
            color: var(--text-muted);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Main Container */
        #main-container {
            display: flex;
            width: 100%;
            height: 100%;
            margin-top: 70px;
            margin-bottom: 50px;
        }

        /* Sidebar */
        #sidebar {
            width: 320px;
            background-color: var(--charcoal-light);
            border-left: 1px solid rgba(224, 224, 224, 0.1);
            overflow-y: auto;
            transition: transform 0.3s ease;
            z-index: 50;
            display: flex;
            flex-direction: column;
        }

        #sidebar.collapsed {
            transform: translateX(320px);
        }

        .sidebar-header {
            padding: 20px 16px;
            border-bottom: 1px solid rgba(224, 224, 224, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-title {
            font-weight: 600;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
        }

        .sidebar-toggle {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 18px;
            padding: 4px;
            display: none;
        }

        .sidebar-toggle:hover {
            color: var(--text-light);
        }

        /* Filter Tabs */
        .filter-tabs {
            display: flex;
            gap: 8px;
            padding: 12px 16px;
            border-bottom: 1px solid rgba(224, 224, 224, 0.1);
            overflow-x: auto;
        }

        .filter-tab {
            padding: 6px 12px;
            border-radius: 4px;
            border: 1px solid rgba(224, 224, 224, 0.2);
            background-color: transparent;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            white-space: nowrap;
            transition: all 0.2s;
            font-family: 'IBM Plex Sans Arabic', sans-serif;
        }

        .filter-tab:hover {
            border-color: var(--golden-wheat-mid);
            color: var(--golden-wheat-mid);
        }

        .filter-tab.active {
            background-color: var(--forest-green-primary);
            border-color: var(--forest-green-primary);
            color: white;
        }

        /* Vehicle List */
        .vehicle-list-container {
            flex: 1;
            overflow-y: auto;
            padding: 0;
        }

        .vehicle-list {
            list-style: none;
            padding: 8px;
            gap: 8px;
            display: flex;
            flex-direction: column;
        }

        .vehicle-item {
            padding: 12px;
            background-color: var(--charcoal-dark);
            border: 1px solid rgba(224, 224, 224, 0.1);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            border-right: 3px solid transparent;
        }

        .vehicle-item:hover {
            background-color: rgba(66, 129, 119, 0.2);
            border-right-color: var(--forest-green-primary);
        }

        .vehicle-item.active {
            background-color: rgba(66, 129, 119, 0.3);
            border-right-color: var(--golden-wheat-mid);
        }

        .vehicle-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .vehicle-name {
            font-weight: 600;
            font-size: 13px;
            color: var(--text-light);
        }

        .vehicle-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .vehicle-badge.gps {
            background-color: rgba(139, 92, 246, 0.3);
            color: var(--gps-purple);
        }

        .vehicle-badge.bus {
            background-color: rgba(66, 129, 119, 0.3);
            color: var(--forest-green-primary);
        }

        .vehicle-badge.microbus {
            background-color: rgba(185, 167, 121, 0.3);
            color: var(--golden-wheat-mid);
        }

        .vehicle-badge.taxi {
            background-color: rgba(212, 168, 75, 0.3);
            color: #d4a84b;
        }

        .vehicle-details {
            font-size: 12px;
            color: var(--text-muted);
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .vehicle-detail-line {
            display: flex;
            justify-content: space-between;
        }

        .detail-label {
            color: var(--text-muted);
        }

        .detail-value {
            color: var(--text-light);
            font-weight: 500;
        }

        /* Map Container */
        #map-container {
            flex: 1;
            position: relative;
            background-color: var(--charcoal-dark);
        }

        #map {
            width: 100%;
            height: 100%;
        }

        .maplibre-canvas {
            outline: none;
        }

        /* Custom Map Popup */
        .maplibregl-popup-content {
            background-color: var(--charcoal-light);
            border: 1px solid rgba(224, 224, 224, 0.2);
            border-radius: 6px;
            padding: 12px;
            font-family: 'IBM Plex Sans Arabic', sans-serif;
            color: var(--text-light);
        }

        .maplibregl-popup-close-button {
            color: var(--text-muted);
        }

        .maplibregl-popup-close-button:hover {
            color: var(--text-light);
        }

        .popup-content {
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-width: 200px;
        }

        .popup-title {
            font-weight: 600;
            font-size: 14px;
            color: var(--golden-wheat-mid);
        }

        .popup-row {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            font-size: 12px;
        }

        .popup-label {
            color: var(--text-muted);
        }

        .popup-value {
            color: var(--text-light);
            font-weight: 500;
        }

        .popup-badge {
            display: inline-block;
            padding: 2px 6px;
            background-color: var(--forest-green-primary);
            color: white;
            border-radius: 3px;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
        }

        /* Footer */
        #footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 50px;
            background-color: var(--charcoal-light);
            border-top: 1px solid rgba(224, 224, 224, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 24px;
            font-size: 12px;
            color: var(--text-muted);
            z-index: 50;
        }

        .footer-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
        }

        .footer-link {
            color: var(--golden-wheat-mid);
            text-decoration: none;
            transition: color 0.2s;
        }

        .footer-link:hover {
            color: var(--text-light);
        }

        /* Scrollbar Styling */
        #sidebar::-webkit-scrollbar,
        .vehicle-list-container::-webkit-scrollbar {
            width: 6px;
        }

        #sidebar::-webkit-scrollbar-track,
        .vehicle-list-container::-webkit-scrollbar-track {
            background: transparent;
        }

        #sidebar::-webkit-scrollbar-thumb,
        .vehicle-list-container::-webkit-scrollbar-thumb {
            background-color: rgba(224, 224, 224, 0.2);
            border-radius: 3px;
        }

        #sidebar::-webkit-scrollbar-thumb:hover,
        .vehicle-list-container::-webkit-scrollbar-thumb:hover {
            background-color: rgba(224, 224, 224, 0.4);
        }

        /* Responsive */
        @media (max-width: 768px) {
            #sidebar {
                position: fixed;
                left: 0;
                top: 70px;
                bottom: 50px;
                width: 280px;
                z-index: 60;
            }

            #sidebar.collapsed {
                transform: translateX(280px);
            }

            .sidebar-toggle {
                display: block;
            }

            .fleet-stats {
                gap: 12px;
            }

            .stat-value {
                font-size: 14px;
            }

            #main-container {
                margin-top: 70px;
                margin-bottom: 50px;
            }
        }

        @media (max-width: 480px) {
            #header {
                padding: 0 12px;
            }

            .logo {
                font-size: 18px;
            }

            .fleet-stats {
                gap: 8px;
            }

            .stat-value {
                font-size: 12px;
            }

            .stat-label {
                font-size: 9px;
            }
        }

        /* Loading and Error States */
        .error-message {
            padding: 16px;
            background-color: rgba(239, 68, 68, 0.1);
            border: 1px solid #ef4444;
            border-radius: 6px;
            color: #fca5a5;
            font-size: 12px;
            margin: 12px;
        }

        .empty-state {
            padding: 24px 16px;
            text-align: center;
            color: var(--text-muted);
            font-size: 12px;
        }

        .marker-glow {
            filter: drop-shadow(0 0 8px rgba(139, 92, 246, 0.6));
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header id="header">
        <div class="header-left">
            <div class="logo">DamascusTransit</div>
        </div>
        <div class="header-right">
            <div class="fleet-stats">
                <div class="stat-item">
                    <div class="stat-value" id="active-vehicles">0</div>
                    <div class="stat-label">مركبات نشطة</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="active-routes">0</div>
                    <div class="stat-label">خطوط</div>
                </div>
            </div>
            <div class="status-indicator">
                <div class="status-dot" id="connection-status"></div>
                <span id="status-text">متصل</span>
            </div>
        </div>
    </header>

    <!-- Main Container -->
    <div id="main-container">
        <!-- Sidebar -->
        <aside id="sidebar">
            <div class="sidebar-header">
                <span class="sidebar-title">المركبات</span>
                <button class="sidebar-toggle" id="sidebar-toggle">×</button>
            </div>

            <div class="filter-tabs">
                <button class="filter-tab active" data-filter="all">الكل</button>
                <button class="filter-tab" data-filter="bus">حافلات</button>
                <button class="filter-tab" data-filter="microbus">ميكروباص</button>
                <button class="filter-tab" data-filter="taxi">تاكسي</button>
                <button class="filter-tab" data-filter="gps">GPS</button>
            </div>

            <div class="vehicle-list-container">
                <ul class="vehicle-list" id="vehicle-list">
                    <div class="empty-state">جاري التحميل...</div>
                </ul>
            </div>
        </aside>

        <!-- Map Container -->
        <div id="map-container">
            <div id="map"></div>
        </div>
    </div>

    <!-- Footer -->
    <footer id="footer">
        <div class="footer-content">
            <span>مدعوم من قبل DamascusTransit</span>
            <span>•</span>
            <a href="https://damascustransit.local/passenger" class="footer-link">تطبيق الركاب</a>
        </div>
    </footer>

    <script>
        // Configuration
        const API_BASE = window.location.origin === 'file://'
            ? 'http://localhost:3000/api'
            : `${window.location.origin}/api`;

        // State Management
        const state = {
            vehicles: new Map(),
            routes: new Map(),
            stops: [],
            currentFilter: 'all',
            selectedVehicleId: null,
            mapInstance: null,
            markers: new Map(),
            polylines: new Map(),
            sseConnection: null,
            isConnected: false,
            reconnectAttempts: 0,
            maxReconnectAttempts: 5,
            reconnectDelay: 3000
        };

        // Initialize Application
        async function initialize() {
            initializeMap();
            await loadInitialData();
            setupEventListeners();
            connectSSE();
            setInterval(updateVehicleList, 1000);
        }

        // Initialize Map
        function initializeMap() {
            const defaultStyle = {
                version: 8,
                sources: {
                    'osm': {
                        type: 'raster',
                        tiles: ['https://tiles.openstreetmap.org/{z}/{x}/{y}.png'],
                        tileSize: 256,
                        attribution: '© OpenStreetMap contributors'
                    }
                },
                layers: [{
                    id: 'osm',
                    type: 'raster',
                    source: 'osm'
                }]
            };

            state.mapInstance = new maplibregl.Map({
                container: 'map',
                style: defaultStyle,
                center: [36.3, 33.51],
                zoom: 11,
                pitch: 0,
                bearing: 0,
                attributionControl: true,
                dragRotate: false,
                touchPitch: false
            });

            state.mapInstance.on('load', () => {
                console.log('Map loaded');
            });
        }

        // Load Initial Data
        async function loadInitialData() {
            try {
                const [vehiclesRes, routesRes] = await Promise.all([
                    fetch(`${API_BASE}/vehicles/positions`),
                    fetch(`${API_BASE}/routes`)
                ]);

                if (vehiclesRes.ok) {
                    const vehicles = await vehiclesRes.json();
                    vehicles.forEach(v => {
                        state.vehicles.set(v.vehicle_id, {
                            ...v,
                            lastUpdate: Date.now()
                        });
                    });
                }

                if (routesRes.ok) {
                    const routes = await routesRes.json();
                    routes.forEach(r => {
                        state.routes.set(r.route_id, r);
                    });
                }

                renderVehicles();
                updateStats();
            } catch (error) {
                console.error('Failed to load initial data:', error);
                showError('فشل في تحميل البيانات الأولية');
            }
        }

        // Setup Event Listeners
        function setupEventListeners() {
            // Filter tabs
            document.querySelectorAll('.filter-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    state.currentFilter = tab.dataset.filter;
                    renderVehicles();
                });
            });

            // Sidebar toggle
            document.getElementById('sidebar-toggle').addEventListener('click', () => {
                document.getElementById('sidebar').classList.toggle('collapsed');
            });

            // Vehicle list items
            document.addEventListener('click', (e) => {
                const vehicleItem = e.target.closest('.vehicle-item');
                if (vehicleItem) {
                    const vehicleId = vehicleItem.dataset.vehicleId;
                    selectVehicle(vehicleId);
                }
            });
        }

        // Connect to SSE Stream
        function connectSSE() {
            if (state.sseConnection) {
                state.sseConnection.close();
            }

            const eventSource = new EventSource(`${API_BASE}/stream`);
            state.sseConnection = eventSource;

            eventSource.onopen = () => {
                state.isConnected = true;
                state.reconnectAttempts = 0;
                updateConnectionStatus();
                console.log('SSE connected');
            };

            eventSource.onmessage = (event) => {
                try {
                    const positions = JSON.parse(event.data);
                    if (Array.isArray(positions)) {
                        positions.forEach(pos => {
                            state.vehicles.set(pos.vehicle_id, {
                                ...pos,
                                lastUpdate: Date.now()
                            });
                        });
                        renderVehicles();
                        updateStats();
                    }
                } catch (error) {
                    console.error('Error parsing SSE data:', error);
                }
            };

            eventSource.onerror = () => {
                state.isConnected = false;
                updateConnectionStatus();
                eventSource.close();

                if (state.reconnectAttempts < state.maxReconnectAttempts) {
                    state.reconnectAttempts++;
                    setTimeout(() => {
                        console.log(`Reconnecting SSE (attempt ${state.reconnectAttempts})`);
                        connectSSE();
                    }, state.reconnectDelay);
                } else {
                    showError('فقدان الاتصال بالخادم');
                }
            };
        }

        // Render Vehicles on Map and List
        function renderVehicles() {
            const filteredVehicles = filterVehicles();

            // Clear and render vehicle list
            const vehicleList = document.getElementById('vehicle-list');
            vehicleList.innerHTML = '';

            if (filteredVehicles.length === 0) {
                vehicleList.innerHTML = '<div class="empty-state">لا توجد مركبات</div>';
                return;
            }

            // Sort by vehicle_id
            filteredVehicles.sort((a, b) => a.vehicle_id.localeCompare(b.vehicle_id));

            filteredVehicles.forEach(vehicle => {
                const listItem = createVehicleListItem(vehicle);
                vehicleList.appendChild(listItem);

                // Render marker on map
                renderMarker(vehicle);
            });

            // Remove old markers not in filtered list
            const visibleIds = new Set(filteredVehicles.map(v => v.vehicle_id));
            state.markers.forEach((marker, vehicleId) => {
                if (!visibleIds.has(vehicleId)) {
                    marker.remove();
                    state.markers.delete(vehicleId);
                }
            });
        }

        // Filter Vehicles
        function filterVehicles() {
            const filter = state.currentFilter;
            const vehicles = Array.from(state.vehicles.values());

            if (filter === 'all') return vehicles;
            if (filter === 'gps') return vehicles.filter(v => v.source === 'gps');
            return vehicles.filter(v => v.vehicle_type === filter);
        }

        // Create Vehicle List Item
        function createVehicleListItem(vehicle) {
            const li = document.createElement('li');
            li.className = 'vehicle-item';
            if (state.selectedVehicleId === vehicle.vehicle_id) {
                li.classList.add('active');
            }
            li.dataset.vehicleId = vehicle.vehicle_id;

            const isGPS = vehicle.source === 'gps';
            const typeLabel = getVehicleTypeLabel(vehicle.vehicle_type);
            const badgeClass = isGPS ? 'gps' : vehicle.vehicle_type;

            li.innerHTML = `
                <div class="vehicle-header">
                    <div class="vehicle-name">${vehicle.vehicle_id}</div>
                    <span class="vehicle-badge ${badgeClass}">
                        ${isGPS ? 'GPS' : typeLabel}
                    </span>
                </div>
                <div class="vehicle-details">
                    <div class="vehicle-detail-line">
                        <span class="detail-label">الخط:</span>
                        <span class="detail-value">${vehicle.route_name || 'N/A'}</span>
                    </div>
                    <div class="vehicle-detail-line">
                        <span class="detail-label">السرعة:</span>
                        <span class="detail-value">${Math.round(vehicle.speed)} km/h</span>
                    </div>
                </div>
            `;

            return li;
        }

        // Get Vehicle Type Label
        function getVehicleTypeLabel(type) {
            const labels = {
                'bus': 'حافلة',
                'microbus': 'ميكروباص',
                'taxi': 'تاكسي'
            };
            return labels[type] || type;
        }

        // Render Marker on Map
        function renderMarker(vehicle) {
            const { lat, lon, heading, vehicle_type, vehicle_id, source } = vehicle;

            if (!lat || !lon) return;

            // Remove old marker if exists
            if (state.markers.has(vehicle_id)) {
                state.markers.get(vehicle_id).remove();
            }

            // Determine color and icon
            let color, iconChar;
            const isGPS = source === 'gps';

            if (isGPS) {
                color = '#8B5CF6';
                iconChar = '📍';
            } else {
                switch (vehicle_type) {
                    case 'bus':
                        color = '#428177';
                        iconChar = '🚌';
                        break;
                    case 'microbus':
                        color = '#b9a779';
                        iconChar = '🚐';
                        break;
                    case 'taxi':
                        color = '#d4a84b';
                        iconChar = '🚕';
                        break;
                    default:
                        color = '#428177';
                        iconChar = '🚌';
                }
            }

            // Create marker element
            const el = document.createElement('div');
            el.style.width = isGPS ? '36px' : '32px';
            el.style.height = isGPS ? '36px' : '32px';
            el.style.backgroundImage = `url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="${encodeURIComponent(color)}" opacity="0.9"/><text x="50" y="55" font-size="50" text-anchor="middle" dominant-baseline="middle">${iconChar}</text></svg>')`;
            el.style.backgroundSize = 'contain';
            el.style.backgroundRepeat = 'no-repeat';
            el.style.backgroundPosition = 'center';
            el.style.transform = `rotate(${heading || 0}deg)`;
            el.style.cursor = 'pointer';

            if (isGPS) {
                el.classList.add('marker-glow');
            }

            // Create marker popup
            const popupContent = document.createElement('div');
            popupContent.className = 'popup-content';
            popupContent.innerHTML = `
                <div class="popup-title">${vehicle_id}</div>
                <div class="popup-row">
                    <span class="popup-label">الخط:</span>
                    <span class="popup-value">${vehicle.route_name || 'N/A'}</span>
                </div>
                <div class="popup-row">
                    <span class="popup-label">السرعة:</span>
                    <span class="popup-value">${Math.round(vehicle.speed)} km/h</span>
                </div>
                <div class="popup-row">
                    <span class="popup-label">الاتجاه:</span>
                    <span class="popup-value">${Math.round(heading || 0)}°</span>
                </div>
                <div class="popup-row">
                    <span class="popup-label">المصدر:</span>
                    <span class="popup-value">${source === 'gps' ? 'GPS' : 'محاكاة'}</span>
                </div>
            `;

            const popup = new maplibregl.Popup({ offset: 25 })
                .setDOMContent(popupContent);

            // Create and add marker
            const marker = new maplibregl.Marker({
                element: el,
                anchor: 'center'
            })
                .setLngLat([lon, lat])
                .setPopup(popup)
                .addTo(state.mapInstance);

            state.markers.set(vehicle_id, marker);

            // Click to select
            el.addEventListener('click', () => {
                selectVehicle(vehicle_id);
                marker.togglePopup();
            });
        }

        // Select Vehicle
        function selectVehicle(vehicleId) {
            state.selectedVehicleId = vehicleId;

            // Update list UI
            document.querySelectorAll('.vehicle-item').forEach(item => {
                item.classList.remove('active');
                if (item.dataset.vehicleId === vehicleId) {
                    item.classList.add('active');
                }
            });

            // Center map on vehicle
            const vehicle = state.vehicles.get(vehicleId);
            if (vehicle && state.mapInstance) {
                state.mapInstance.flyTo({
                    center: [vehicle.lon, vehicle.lat],
                    zoom: 14,
                    duration: 1000
                });
            }
        }

        // Update Vehicle List (live updates)
        function updateVehicleList() {
            const selectedItem = document.querySelector('.vehicle-item.active');
            if (!selectedItem) return;

            const vehicleId = selectedItem.dataset.vehicleId;
            const vehicle = state.vehicles.get(vehicleId);

            if (vehicle) {
                const speedEl = selectedItem.querySelector('.detail-value:last-of-type');
                if (speedEl) {
                    speedEl.textContent = `${Math.round(vehicle.speed)} km/h`;
                }
            }
        }

        // Update Stats
        function updateStats() {
            const vehicles = Array.from(state.vehicles.values());
            document.getElementById('active-vehicles').textContent = vehicles.length;

            const uniqueRoutes = new Set(vehicles.map(v => v.route_name).filter(Boolean));
            document.getElementById('active-routes').textContent = uniqueRoutes.size;
        }

        // Update Connection Status
        function updateConnectionStatus() {
            const statusDot = document.getElementById('connection-status');
            const statusText = document.getElementById('status-text');

            if (state.isConnected) {
                statusDot.classList.remove('disconnected');
                statusText.textContent = 'متصل';
            } else {
                statusDot.classList.add('disconnected');
                statusText.textContent = 'غير متصل';
            }
        }

        // Show Error Message
        function showError(message) {
            const sidebar = document.getElementById('sidebar');
            const existingError = sidebar.querySelector('.error-message');
            if (existingError) existingError.remove();

            const errorEl = document.createElement('div');
            errorEl.className = 'error-message';
            errorEl.textContent = message;

            sidebar.insertBefore(errorEl, sidebar.firstChild.nextSibling.nextSibling);

            setTimeout(() => errorEl.remove(), 5000);
        }

        // Start Application
        window.addEventListener('load', initialize);
    </script>
</body>
</html>
