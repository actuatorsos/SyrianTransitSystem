<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Damascus Transit | Admin Login — تسجيل الدخول</title>
    <meta name="theme-color" content="#428177">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --forest-green: #34d399;
            --forest-dark: #059669;
            --forest-black: #022c22;
            --golden: #f59e0b;
            --golden-mid: #fbbf24;
            --charcoal: #1f2937;
            --charcoal-light: #111827;
            --white: #ffffff;
            --text-light: #f9fafb;
            --text-muted: #9ca3af;
            --border-color: rgba(255, 255, 255, 0.15);
            --danger: #ef4444;
        }

        html, body {
            font-family: 'IBM Plex Sans Arabic', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--charcoal-light);
            color: var(--text-light);
            height: 100%;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--forest-black) 0%, var(--charcoal-light) 60%, #000 100%);
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(52, 211, 153, 0.15), transparent 70%);
            top: -150px;
            right: -150px;
            border-radius: 50%;
            pointer-events: none;
        }

        .login-card {
            background: rgba(31, 41, 55, 0.6);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 16px 40px rgba(0,0,0,0.3);
            position: relative;
            z-index: 10;
        }

        .login-logo {
            font-size: 30px;
            font-weight: 700;
            color: var(--golden);
            margin-bottom: 6px;
        }

        .login-logo-en {
            font-size: 13px;
            color: var(--golden-mid);
            letter-spacing: 0.05em;
            margin-bottom: 32px;
        }

        .login-error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 13px;
            display: none;
            text-align: right;
        }

        .login-error.show { display: block; }

        .field-group {
            margin-bottom: 16px;
            text-align: right;
        }

        .field-label {
            display: block;
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .field-label span { font-size: 11px; color: var(--border-color); margin-right: 4px; }

        .login-input {
            width: 100%;
            padding: 12px 14px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
            color: var(--text-light);
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            text-align: right;
            direction: ltr;
            transition: all 0.25s ease;
        }

        .login-input::placeholder { color: var(--text-muted); direction: rtl; }

        .login-input:focus {
            outline: none;
            border-color: var(--forest-green);
            background: rgba(52, 211, 153, 0.05);
            box-shadow: 0 0 0 3px rgba(52, 211, 153, 0.2);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--forest-green), var(--forest-dark));
            color: var(--charcoal-light);
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            font-family: inherit;
            margin-top: 12px;
            box-shadow: 0 4px 12px rgba(5, 150, 105, 0.3);
        }

        .login-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(5, 150, 105, 0.4); }
        .login-btn:active { transform: translateY(1px); }
        .login-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }

        .login-divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0 4px;
            color: var(--text-muted);
            font-size: 11px;
        }

        .login-divider::before,
        .login-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-color);
        }

        .role-hint {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-logo">نقل دمشق</div>
        <div class="login-logo-en">Damascus Transit · Admin Panel</div>

        <div class="login-error" id="loginError"></div>

        <div class="field-group">
            <label class="field-label" for="loginEmail">
                البريد الإلكتروني <span>/ Email</span>
            </label>
            <input
                type="email"
                id="loginEmail"
                class="login-input"
                placeholder="admin@example.com"
                autocomplete="email"
            >
        </div>

        <div class="field-group">
            <label class="field-label" for="loginPassword">
                كلمة المرور <span>/ Password</span>
            </label>
            <input
                type="password"
                id="loginPassword"
                class="login-input"
                placeholder="••••••••"
                autocomplete="current-password"
            >
        </div>

        <button class="login-btn" id="loginBtn" onclick="handleLogin()">
            دخول &nbsp;/&nbsp; Sign In
        </button>

        <div class="role-hint">
            للمديرين والمشغّلين فقط · Authorized personnel only
        </div>

    </div>

    <script>
        // ==================== CONFIG ====================
        function getApiBase() {
            const h = window.location.hostname;
            if (h === 'localhost' || h.includes('vercel')) return window.location.origin;
            return '';
        }

        const API_BASE = getApiBase();

        // Redirect to dashboard if already authenticated
        (function checkExistingSession() {
            const token = sessionStorage.getItem('adminToken');
            if (token) {
                window.location.replace('/admin/');
            }
        })();

        // ==================== LOGIN ====================
        function handleLogin() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            const loginBtn = document.getElementById('loginBtn');

            if (!email || !password) {
                showError('يرجى ملء جميع الحقول · Please fill in all fields');
                return;
            }

            loginBtn.disabled = true;
            loginBtn.textContent = '...جاري الدخول';

            fetch(`${API_BASE}/api/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            })
            .then(res => res.json().then(data => ({ ok: res.ok, data })))
            .then(({ ok, data }) => {
                if (ok && data.access_token) {
                    const role = data.role || 'viewer';
                    const allowedRoles = ['admin', 'super_admin', 'dispatcher'];
                    if (!allowedRoles.includes(role)) {
                        showError('ليس لديك صلاحية الوصول · Access not authorized for your role');
                        return;
                    }
                    // Store in sessionStorage (in-memory per tab, not persisted like localStorage)
                    sessionStorage.setItem('adminToken', data.access_token);
                    sessionStorage.setItem('adminUserId', data.user_id);
                    sessionStorage.setItem('adminRole', role);
                    window.location.replace('/admin/');
                } else {
                    showError(data.detail || data.error || 'فشل تسجيل الدخول · Login failed');
                }
            })
            .catch(() => {
                showError('خطأ في الاتصال · Connection error. Please try again.');
            })
            .finally(() => {
                loginBtn.disabled = false;
                loginBtn.textContent = 'دخول / Sign In';
            });
        }

        function showError(msg) {
            const el = document.getElementById('loginError');
            el.textContent = msg;
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 6000);
        }

        // Allow Enter key to submit
        document.addEventListener('keydown', e => {
            if (e.key === 'Enter') handleLogin();
        });
    </script>
</body>
</html>
